name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests
        run: dotnet test --no-restore --configuration Release

      - name: Publish (self-contained, win-x64)
        run: |
          dotnet publish src/MusicDuplicateFilter/MusicDuplicateFilter.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output publish/win-x64

      - name: Archive release
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path publish/win-x64/* -DestinationPath "MusicDuplicateFilter-$tag-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MusicDuplicateFilter ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            MusicDuplicateFilter-${{ github.ref_name }}-win-x64.zip
